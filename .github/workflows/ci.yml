name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPYCACHEPREFIX: .local/pycache
    
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        pip install "torch>=2.5" --index-url https://download.pytorch.org/whl/cpu
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Test portfolio builder
      run: |
        pytest tests/test_portfolio_builder.py -q
    
    - name: Test no leakage panel
      run: |
        pytest tests/test_no_leakage_panel.py -q
    
    - name: Test reproducibility panel
      run: |
        pytest tests/test_reproducibility_panel.py -q
    
    - name: Test split plan
      run: |
        pytest tests/test_split_plan.py -q
    
    - name: Test holdout isolation
      run: |
        pytest tests/test_holdout_isolation.py -q
    
    - name: Test embargo integrity
      run: |
        pytest tests/test_embargo_integrity.py -q
    
    - name: Test search engine
      run: |
        pytest tests/test_search_engine.py -q
    
    - name: Test sequence builder
      run: |
        pytest tests/test_sequence_builder.py -q
    
    - name: Test sequence boundary by ticker
      run: |
        pytest tests/test_sequence_boundary_by_ticker.py -q

    - name: Test sequence prediction shape
      run: |
        pytest tests/test_sequence_prediction_shape.py -q
    
    - name: Test model registry
      run: |
        pytest tests/test_model_registry.py -q
    
    - name: Test rolling retrainer
      run: |
        pytest tests/test_rolling_retrainer.py -q
    
    - name: Test end to end
      run: |
        pytest tests/test_end_to_end.py -q
    
    - name: Test torch models smoke
      run: |
        pytest tests/test_torch_models_smoke.py -q
