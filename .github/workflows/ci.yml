name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPYCACHEPREFIX: .local/pycache
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "torch>=2.5" --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements-dev.txt

      - name: Run test suite
        run: pytest -q --maxfail=1 -m "not slow and not integration"

  coverage:
    runs-on: ubuntu-latest
    env:
      PYTHONPYCACHEPREFIX: .local/pycache
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install coverage dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "torch>=2.5" --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements-dev.txt

      - name: Run coverage
        run: pytest --cov=. --cov-report=term-missing --cov-report=xml --cov-fail-under=70

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install typecheck dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "torch>=2.5" --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements-dev.txt

      - name: Run mypy
        run: mypy utils.py main_basket.py rolling_retrainer.py execution_engine.py backtester_engine.py panel_trainer.py portfolio_builder.py models.py feature_dpoint.py
